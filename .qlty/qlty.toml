# This configuration was generated with the setup-qlty-toml skill.
# For reference: https://docs.qlty.sh/qlty-toml
config_version = "0"

exclude_patterns = [
  "**/.git/**",
  "**/node_modules/**",
  "**/dist/**",
  "**/__pycache__/**",
  "**/*.pyc",
  "**/site/**",
]

test_patterns = [
  "**/tests/**",
  "**/*_test.py",
  "**/*tests.py",
]

[smells]
mode = "comment"

# Required — points to the built-in Qlty plugin registry.
[[source]]
name = "default"
default = true

# Language linters
[[plugin]]
name = "ruff"
mode = "comment"
config_files = ["pyproject.toml"]

# Security scanners
[[plugin]]
name = "bandit"
mode = "block"

[[plugin]]
name = "trufflehog"
mode = "block"

[[plugin]]
name = "osv-scanner"
mode = "block"

# Cross-language tools
[[plugin]]
name = "markdownlint"
mode = "comment"
config_files = [".markdownlint.yaml"]

[[plugin]]
name = "yamllint"
mode = "comment"

[[plugin]]
name = "actionlint"
mode = "comment"

